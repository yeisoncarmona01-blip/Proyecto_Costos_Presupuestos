<a routerLink="/" class="login-back">← Volver al Inicio</a>

<main class="login-card" aria-label="Formulario de inicio de sesión">
  <section class="login-hero">
    <strong>SoftCost</strong>
    <p>Plataforma de Costos y Presupuestos</p>
  </section>

  <section class="login-body">
    <h1 class="login-title">Iniciar Sesión</h1>
    <p class="login-subtitle">Accede a tu cuenta</p>

    <label class="login-label" for="login-email">Correo Electrónico</label>
    <input
      id="login-email"
      class="login-input"
      type="email"
      placeholder="usuario@ejemplo.com"
      autocomplete="email"
      [(ngModel)]="email"
    />

    <label class="login-label" for="login-password">Contraseña</label>
    <input
      id="login-password"
      class="login-input"
      type="password"
      placeholder="********"
      autocomplete="current-password"
      [(ngModel)]="password"
    />

    <div class="login-row">
      <label class="login-check" for="login-remember">
        <input id="login-remember" type="checkbox" [(ngModel)]="rememberMe" />
        <span>Recordarme</span>
      </label>
      <a class="login-link" href="#">¿Olvidaste tu contraseña?</a>
    </div>

    <button class="login-submit" type="button" (click)="onLogin()">Iniciar Sesión</button>

    <div class="login-divider">o continúa con</div>

    <div class="login-social">
      <a href="#">Google</a>
      <a href="#">Facebook</a>
    </div>

    <p class="auth-switch">¿No tienes cuenta? <a routerLink="/login/registro">Regístrate</a></p>
  </section>
</main>
